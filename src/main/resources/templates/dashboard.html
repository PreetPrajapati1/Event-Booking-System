<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f7f7f7;
            min-height: 100vh;
        }
        .dashboard-card {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-6">
        <div class="card dashboard-card p-4 text-center">

            <h3 class="mb-4">🎟️ Event Booking System</h3>

            <div class="d-grid gap-3">
                <a href="/events" class="btn btn-primary btn-lg">
                    View Events
                </a>

                <a href="/myBookings" class="btn btn-success btn-lg">
                    My Bookings
                </a>

                <a href="/login" class="btn btn-outline-danger btn-lg">
                    Logout
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
