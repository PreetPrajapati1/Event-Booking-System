<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Events</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .event-card {
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Available Events</h3>
        <a href="/dashboard" class="btn btn-secondary">Back</a>
    </div>

    <!-- 🔍 Search Bar -->
    <form method="get" action="/events" class="mb-4">
        <div class="input-group">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search event name..."
                   th:value="${keyword}">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="event : ${events}">
            <div class="card event-card p-3 h-100">

                <h5 th:text="${event.eventName}"></h5>
                <p class="text-muted">
                    📅 <span th:text="${event.eventDate}"></span>
                </p>

                <a th:href="@{/seats(event_id=${event.id})}"
                   class="btn btn-primary w-100">
                    Book Seats
                </a>

            </div>
        </div>

        <!-- No results -->
        <div th:if="${#lists.isEmpty(events)}" class="text-center text-muted">
            No events found
        </div>
    </div>

</div>

</body>
</html>
