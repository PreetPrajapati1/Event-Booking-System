<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }
        .btn-danger {
            border-radius: 20px;
        }
        .btn-primary {
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card p-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Admin Dashboard</h3>
            <a href="/dashboard" class="btn btn-secondary btn-sm">Back to User Dashboard</a>
        </div>

        <!-- Create Event Button -->
        <div class="mb-3 text-end">
            <a href="/admin/createEvent" class="btn btn-primary">
                + Create New Event
            </a>
        </div>

        <!-- Events Table -->
        <table class="table table-bordered table-hover text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Event Name</th>
                    <th>Event Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="event : ${events}">
                    <td th:text="${event.eventName}"></td>
                    <td th:text="${event.eventDate}"></td>
                    <td>
                        <a th:href="@{'/admin/deleteEvent/' + ${event.id}}"
                           onclick="return confirm('Delete this event?')"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>

                <!-- Empty State -->
                <tr th:if="${#lists.isEmpty(events)}">
                    <td colspan="3" class="text-muted">
                        No events available
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
